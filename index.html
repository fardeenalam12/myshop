<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyShop | Premium Tech & Wearables</title>
    <meta name="description" content="Discover premium futuristic gear, headphones, smartwatches, and sneakers at MyShop.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="#" class="brand">My<span>Shop</span></a>
            <div class="nav-links">
                <a href="#hero">Home</a>
                <a href="#products">Shop</a>
                <a href="#about">About</a>
            </div>
            <button class="cart-btn" id="cart-toggle-btn" aria-label="Toggle Cart">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="cart-icon">
                    <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z" fill="currentColor"/>
                </svg>
                <span class="cart-badge" id="cart-badge">0</span>
            </button>
        </div>
    </nav>

    <!-- Cart Sidebar -->
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h2>Your Cart</h2>
            <button class="close-cart-btn" id="close-cart-btn" aria-label="Close Cart">&times;</button>
        </div>
        <div class="cart-items" id="cart-items-container">
            <div class="empty-cart-msg">Your cart is empty.</div>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total</span>
                <span id="cart-total-price">$0.00</span>
            </div>
            <button class="checkout-btn" id="checkout-btn">Proceed to Checkout</button>
        </div>
    </div>
    <div class="cart-overlay" id="cart-overlay"></div>

    <!-- Notification Toast -->
    <div class="toast-container" id="toast-container"></div>

    <main>
        <!-- Hero Section -->
        <section class="hero" id="hero">
            <div class="hero-content">
                <h1 class="hero-title">Experience the <span class="highlight">Future</span> of Tech.</h1>
                <p class="hero-subtitle">Premium gear crafted for performance, designed for tomorrow.</p>
                <div class="hero-actions">
                    <a href="#products" class="btn btn-primary">Shop Collection</a>
                    <a href="#about" class="btn btn-secondary">Learn More</a>
                </div>
            </div>
            <div class="hero-visual">
                <div class="glow-sphere"></div>
                <img src="assets/headphones.png" alt="Featured Product" class="hero-img floating" />
            </div>
        </section>

        <!-- Products Section -->
        <section class="products-section" id="products">
            <div class="section-title-wrapper">
                <h2 class="section-title">New Arrivals</h2>
                <div class="title-underline"></div>
            </div>
            
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="audio">Audio</button>
                <button class="filter-btn" data-filter="wearables">Wearables</button>
                <button class="filter-btn" data-filter="footwear">Footwear</button>
            </div>

            <div class="product-grid" id="product-grid">
                <!-- Products dynamically inserted via JS -->
            </div>
        </section>
    </main>

    <footer class="footer" id="about">
        <p>&copy; 2026 MyShop | Premium E-commerce Layered Vanilla SPA</p>
    </footer>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/services.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
